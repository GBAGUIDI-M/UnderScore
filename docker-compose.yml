version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: predictor_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # For hot reload without rebuilding (optional, mainly dev)
      - ./PSL_xG_Database_2425.csv:/app/PSL_xG_Database_2425.csv
      - ./PSL_MatchStats_2425.csv:/app/PSL_MatchStats_2425.csv
      - ./PSL_Events_Database_2425.csv:/app/PSL_Events_Database_2425.csv
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: predictor_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
